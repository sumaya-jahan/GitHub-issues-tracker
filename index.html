<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title and logo -->
    <title>index</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="min-h-screen grid place-items-center bg-base-200">

    <section class="bg-base-100 shadow-2xl rounded-2xl px-7 py-8 w-[380px]">

        <header class="text-center space-y-2">

            <div class="flex items-center justify-center">
                <img src="./assets/github-logo.png" alt="GitHub Logo">
            </div>

            <h1 class="font-bold text-2xl">
                GitHub Issues Tracker
            </h1>

            <p class="text-sm text-gray-500">
                Sign in to manage your issues
            </p>
        </header>


        <form class="mt-6 space-y-4">

            <div>
                <p class="font-medium mb-1">Username</p>
                <input id="input-user" class="input input-bordered w-full" type="text" placeholder="Enter Username" />
            </div>

           
            <div>
                <p class="font-medium mb-1">Password</p>
                <input id="input-password" class="input input-bordered w-full" type="password" placeholder="Enter Password" />
            </div>

            
            <button type="button" id="signIn-btn" class="btn btn-primary w-full mt-2 mb-10">
                Sign In
            </button>
        </form>


    </section>
<script src="./sign-in.js"></script>
</body>
</body>

</html>
